name: CI/CD — Dev

on:
  push:
    branches:
      - dev

env:
  BACKEND_IMAGE: dihake/egzamin-maklerski-backend
  FRONTEND_IMAGE: dihake/egzamin-maklerski-frontend
  AZURE_RESOURCE_GROUP: egzamin-maklerski-dev-rg
  BACKEND_APP_NAME: egzamin-maklerski-dev-backend
  FRONTEND_APP_NAME: egzamin-maklerski-dev-frontend
  FUNCTIONS_APP_NAME: egzamin-maklerski-dev-func

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          MONGO_URI: "mongodb://localhost:27017"
          GOOGLE_CLIENT_ID: "ci-test-client-id"
          GOOGLE_CLIENT_SECRET: "ci-test-client-secret"
          JWT_SECRET_KEY: "ci-test-jwt-secret-key-padding-value"
          ADMIN_EMAIL: "admin@example.com"
        run: pytest -q

  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    needs: test
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive image tag
        id: tag
        run: echo "value=dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.BACKEND_IMAGE }}:dev-latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.FRONTEND_IMAGE }}:dev-latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name "${{ env.BACKEND_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.value }}"

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name "${{ env.FRONTEND_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}"

      - name: Package and deploy Azure Function App
        run: |
          cd functions
          zip -r ../functions.zip . \
            --exclude "local.settings.json" \
            --exclude "local.settings.json.example" \
            --exclude "Dockerfile" \
            --exclude "seed_local_blobs.py"
          cd ..
          az functionapp deploy \
            --name "${{ env.FUNCTIONS_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --src-path functions.zip \
            --type zip
